name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:

  testes:
    name: Rodar Testes com Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar pasta de relatório
        run: mkdir -p relatorio-testes

      - name: Rodar testes e gerar relatório
        run: |
          pytest --tb=short \
                 --junitxml=relatorio-testes/results.xml \
                 --html=relatorio-testes/report.html \
                 --self-contained-html \
                 -v

      - name: Salvar relatório de testes como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-testes
          path: relatorio-testes/

  build:
    name: Build do Pacote
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências de build
        run: pip install -r requirements-dev.txt

      - name: Gerar pacote distribuível
        run: python -m build

      - name: Salvar pacote como artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacote-distribuivel
          path: dist/

  deploy:
    name: Deploy da Aplicação
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via webhook (Render/Railway)
        run: curl -X POST ${{ secrets.DEPLOY_HOOK }} -f

  notificacao:
    name: Notificação Final
    needs: [testes, build, deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar script de notificação
        run: python scripts/enviar_notificacao.py
        env:
          STATUS: ${{ needs.deploy.result }}